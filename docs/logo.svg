<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a28;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="sonar">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#ocean)" rx="12" />

  <!-- Sonar rings (from periscope) -->
  <circle cx="540" cy="120" r="30" stroke="#00e5cc" stroke-width="1" fill="none" opacity="0.15" />
  <circle cx="540" cy="120" r="55" stroke="#00e5cc" stroke-width="0.8" fill="none" opacity="0.1" />
  <circle cx="540" cy="120" r="80" stroke="#00e5cc" stroke-width="0.5" fill="none" opacity="0.06" />

  <!-- Submarine hull -->
  <ellipse cx="400" cy="210" rx="260" ry="65" fill="url(#hull)" stroke="#00e5cc" stroke-width="1.5" opacity="0.9" />

  <!-- Conning tower / sail -->
  <rect x="370" y="135" width="60" height="50" rx="8" fill="#1a2a3a" stroke="#00e5cc" stroke-width="1.2" />

  <!-- Periscope -->
  <line x1="400" y1="135" x2="400" y2="95" stroke="#00e5cc" stroke-width="2" />
  <rect x="393" y="88" width="14" height="10" rx="2" fill="#1a2a3a" stroke="#00e5cc" stroke-width="1" />

  <!-- Periscope lens glow -->
  <circle cx="400" cy="93" r="3" fill="#00e5cc" filter="url(#glow)" />

  <!-- Hull portholes (the "bunks" - lit up) -->
  <circle cx="240" cy="210" r="10" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.6" />
  <circle cx="240" cy="210" r="4" fill="#00ff88" opacity="0.8" filter="url(#glow)" />

  <circle cx="290" cy="205" r="10" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.6" />
  <circle cx="290" cy="205" r="4" fill="#00e5cc" opacity="0.6" />

  <circle cx="340" cy="202" r="10" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.6" />
  <circle cx="340" cy="202" r="4" fill="#00ff88" opacity="0.8" filter="url(#glow)" />

  <circle cx="460" cy="202" r="10" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.6" />
  <circle cx="460" cy="202" r="4" fill="#ff4444" opacity="0.6" />

  <circle cx="510" cy="205" r="10" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.6" />
  <circle cx="510" cy="205" r="4" fill="#00ff88" opacity="0.8" filter="url(#glow)" />

  <circle cx="560" cy="210" r="10" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.6" />
  <circle cx="560" cy="210" r="4" fill="#00e5cc" opacity="0.6" />

  <!-- Propeller -->
  <ellipse cx="665" cy="210" rx="8" ry="22" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.5" transform="rotate(30 665 210)" />
  <ellipse cx="665" cy="210" rx="8" ry="22" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.5" transform="rotate(-30 665 210)" />
  <ellipse cx="665" cy="210" rx="8" ry="22" fill="none" stroke="#00e5cc" stroke-width="1" opacity="0.5" />

  <!-- Title -->
  <text x="400" y="320" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="48" font-weight="700" fill="#00e5cc" filter="url(#glow)">HOTBUNK</text>

  <!-- Tagline -->
  <text x="400" y="355" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#8b949e" letter-spacing="2">THE SUBMARINE HAS ROOM FOR EVERYONE</text>

  <!-- Porthole legend (tiny) -->
  <circle cx="200" cy="380" r="4" fill="#00ff88" opacity="0.8" />
  <text x="210" y="384" font-family="monospace" font-size="10" fill="#8b949e">idle</text>
  <circle cx="260" cy="380" r="4" fill="#00e5cc" opacity="0.6" />
  <text x="270" y="384" font-family="monospace" font-size="10" fill="#8b949e">sleeping</text>
  <circle cx="340" cy="380" r="4" fill="#ff4444" opacity="0.6" />
  <text x="350" y="384" font-family="monospace" font-size="10" fill="#8b949e">throttled</text>
</svg>